<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Mason Henderson - Contact Card</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <div class="card">

    <div class="header">
      <div class="photo">
        <img id="headshot" alt="Profile photo">
      </div>

      <div class="header-right">
        <div class="logo">
          <img id="companyLogo" alt="Company logo">
        </div>
      </div>
    </div>

    <div class="name-row">
      <div class="name" id="name"></div>
      <button class="add-contact-btn" onclick="openShareModal()" aria-label="Add to contacts">
        +
      </button>
    </div>
    <div class="title" id="title"></div>
    <div class="company" id="company"></div>

    <div class="section">
      <a class="item" id="email"></a>
      <a class="item" id="phone"></a>
      <a class="item" id="website"></a>
      <a class="item" id="address"></a>
    </div>

    <button class="cta-btn" id="calendarBtn">
      Book a Calendar Meeting
    </button>

    <div class="socials-wrapper">
      <div class="socials-label">
        <span></span> socials <span></span>
      </div>

      <div class="social-icons">
        <a id="social-linkedin"><img src="linkedin.svg"></a>
        <a id="social-facebook"><img src="facebook.svg"></a>
        <a id="social-instagram"><img src="instagram.svg"></a>
        <a id="social-whatsapp"><img src="whatsapp.svg"></a>
        <a id="social-snapchat"><img src="snapchat.svg"></a>
        <a id="social-letterboxd"><img src="letterboxd.svg"></a>
      </div>
    </div>

  </div>

  <div class="share-modal" id="shareModal" onclick="closeShareModal()">
    <div class="share-modal-content" onclick="event.stopPropagation()">
      <button class="share-close" onclick="closeShareModal()">✕</button>
      <h3>More Actions</h3>

      <div class="qr-wrapper">
        <img id="qrImage" alt="QR Code">
      </div>

      <p class="qr-hint">Scan this QR code to share!</p>

      <button class="cta-btn" onclick="shareProfile()">Other Ways to Share</button>
      <button class="cta-btn" onclick="downloadVCard()">Add to Contacts</button>
      <button class="cta-btn" onclick="openResumePage()">View Resume</button>
    </div>
  </div>

  <script>
    let profile = {};

    function formatPhone(phone) {
      const digits = phone.replace(/\D/g, "");
      const country = digits.length === 11 ? digits[0] : "1";
      const offset = digits.length === 11 ? 1 : 0;
      return `+${country} (${digits.slice(offset, offset + 3)}) ${digits.slice(offset + 3, offset + 6)}-${digits.slice(offset + 6, offset + 10)}`;
    }

    function openShareModal() {
      document.getElementById("shareModal").classList.add("active");
    }

    function closeShareModal() {
      document.getElementById("shareModal").classList.remove("active");
    }

    function shareProfile() {
      const lines = [
        profile.name,
        profile.title,
        profile.company,
        "",
        profile.phone && `Phone: ${formatPhone(profile.phone)}`,
        profile.email && `Email: ${profile.email}`
      ].filter(Boolean);

      const text = lines.join("\n");

      if (navigator.share) {
        navigator.share({ title: profile.name, text });
      } else {
        location.href = `mailto:?subject=${encodeURIComponent(profile.name + " Contact Information")}&body=${encodeURIComponent(text)}`;
      }
    }

    function downloadVCard() {
      // Navigate to the static .vcf file — works on iOS, Android, and desktop.
      // iOS Safari and Android both handle text/vcard natively and open the
      // "Add to Contacts" dialog. Desktop browsers download the file.
      window.location.href = "mason_henderson.vcf";
    }

    function openResumePage() {
      window.location.href = "resume.html";
    }

    fetch("resume-data.json")
      .then(r => r.json())
      .then(data => {
        profile = data.profile || {};
        const addr = profile.address || {};

        // Basic info
        document.getElementById("name").textContent = profile.name;
        document.getElementById("title").textContent = profile.title;
        document.getElementById("company").textContent = profile.company;
        document.getElementById("headshot").src = profile.images?.headshot || "";
        document.getElementById("companyLogo").src = profile.images?.logo || "";

        // Email
        const emailEl = document.getElementById("email");
        if (profile.email) {
          emailEl.href = `mailto:${profile.email}`;
          emailEl.innerHTML = `
            <img src="email.svg" class="item-icon" alt="Email">
            <span class="item-text">${profile.email}</span>
          `;
        } else {
          emailEl.remove();
        }

        // Phone
        const phoneEl = document.getElementById("phone");
        if (profile.phone) {
          phoneEl.href = `tel:${profile.phone}`;
          phoneEl.innerHTML = `
            <img src="phone.svg" class="item-icon" alt="Phone">
            <span class="item-text">${formatPhone(profile.phone)}</span>
          `;
        } else {
          phoneEl.remove();
        }

        // Website
        const websiteEl = document.getElementById("website");
        if (profile.website) {
          websiteEl.href = profile.website;
          websiteEl.innerHTML = `
            <img src="website.svg" class="item-icon" alt="Website">
            <span class="item-text">${profile.website.replace(/^https?:\/\//, "")}</span>
          `;
        } else {
          websiteEl.remove();
        }

        // Address
        const addressEl = document.getElementById("address");
        const cityLine = [
          addr.city && `${addr.city}${addr.state ? "," : ""}`,
          addr.state,
          addr.zip,
          addr.country
        ].filter(Boolean).join(" ");

        const isRemote = addr.line1?.trim().toLowerCase() === "remote";

        if (isRemote && cityLine) {
          addressEl.href = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(cityLine)}`;
          addressEl.target = "_blank";
          addressEl.rel = "noopener";
          addressEl.innerHTML = `
            <img src="address.svg" class="item-icon" alt="Address">
            <span class="item-text">Remote \u2014 ${cityLine}</span>
          `;
        } else {
          const line1 = [addr.line1, addr.line2].filter(Boolean).join(" ");
          if (line1 || cityLine) {
            const fullAddress = [line1, cityLine].filter(Boolean).join(", ");
            addressEl.href = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(fullAddress)}`;
            addressEl.target = "_blank";
            addressEl.rel = "noopener";
            addressEl.innerHTML = `
              <img src="address.svg" class="item-icon" alt="Address">
              <span class="item-text">
                ${line1 ? `<div>${line1}</div>` : ""}
                ${cityLine ? `<div>${cityLine}</div>` : ""}
              </span>
            `;
          } else {
            addressEl.remove();
          }
        }

        if (!document.querySelector(".section .item")) {
          document.querySelector(".section")?.remove();
        }

        // Calendar
        const calendarBtn = document.getElementById("calendarBtn");
        if (profile.calendarUrl) {
          calendarBtn.addEventListener("click", () => {
            window.open(profile.calendarUrl, "_blank", "noopener");
          });
        } else {
          calendarBtn.remove();
        }

        // Socials
        const socialsWrapper = document.querySelector(".socials-wrapper");
        document.querySelectorAll(".social-icons a").forEach(icon => {
          const key = icon.id.replace("social-", "");
          const url = profile.socials?.[key];
          if (url) {
            icon.href = url;
            icon.target = "_blank";
            icon.rel = "noopener";
          } else {
            icon.remove();
          }
        });

        if (!document.querySelector(".social-icons a")) {
          socialsWrapper?.remove();
        }

        // macOS Dock magnification effect
        const dockEl = document.querySelector(".social-icons");
        const dockItems = dockEl ? [...dockEl.querySelectorAll("a")] : [];

        if (dockItems.length > 1) {
          const MAX_SCALE = 1.75;
          const INFLUENCE = 90; // px radius of effect

          dockEl.addEventListener("mousemove", e => {
            dockItems.forEach(item => {
              const rect = item.getBoundingClientRect();
              const center = rect.left + rect.width / 2;
              const signedDist = center - e.clientX;
              const absDist = Math.abs(signedDist);

              if (absDist < INFLUENCE) {
                const t = 1 - absDist / INFLUENCE;
                const scale = 1 + (MAX_SCALE - 1) * Math.pow(t, 1.5);
                const pushX = Math.sign(signedDist) * 10 * t;
                item.style.transform =
                  `translateX(${pushX.toFixed(1)}px) scale(${scale.toFixed(3)})`;
              } else {
                item.style.transform = "";
              }
            });
          });

          dockEl.addEventListener("mouseleave", () => {
            dockItems.forEach(item => { item.style.transform = ""; });
          });
        }

        // QR code
        document.getElementById("qrImage").src =
          `https://api.qrserver.com/v1/create-qr-code/?size=240x240&data=${encodeURIComponent(profile.shareUrl || location.href)}`;

        // Trigger staggered entrance animations
        document.querySelector(".card").classList.add("loaded");

        // Desktop-only enhancements
        if (window.matchMedia("(hover: hover) and (pointer: fine)").matches) {
          const cardEl = document.querySelector(".card");

          cardEl.addEventListener("mousemove", e => {
            const rect = cardEl.getBoundingClientRect();
            const relX = e.clientX - rect.left;
            const relY = e.clientY - rect.top;
            const x = relX / rect.width  - 0.5;
            const y = relY / rect.height - 0.5;

            // Cursor spotlight
            cardEl.style.setProperty("--mouse-x", relX + "px");
            cardEl.style.setProperty("--mouse-y", relY + "px");

            // 3D tilt
            cardEl.style.transform =
              `perspective(900px) rotateY(${x * 5}deg) rotateX(${-y * 5}deg) translateY(-3px)`;
          });

          cardEl.addEventListener("mouseleave", () => {
            cardEl.style.setProperty("--mouse-x", "-9999px");
            cardEl.style.setProperty("--mouse-y", "-9999px");
            cardEl.style.transition = "transform 0.5s ease";
            cardEl.style.transform = "";
            setTimeout(() => { cardEl.style.transition = ""; }, 500);
          });
        }
      })
      .catch(() => {
        document.body.insertAdjacentHTML(
          "beforeend",
          '<p style="text-align:center;padding:1rem;color:red">Unable to load profile data.</p>'
        );
      });
  </script>
</body>
</html>
